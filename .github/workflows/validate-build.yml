name: Production Build Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: 🛠️ Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🏗️ Run Build (Turbo)
        run: pnpm build
        env:
          # Frontend Environment Variables (Placeholders for CI)
          VITE_API_URL: "https://api.eaoverseas.com"
          VITE_ENVIRONMENT: "ci"
          # Backend Environment Variables (Placeholders for CI)
          PORT: 3001
          MONGODB_URI: "mongodb://localhost:27017/ci_test"
          JWT_SECRET: "ci_jwt_secret"
          JWT_REFRESH_SECRET: "ci_jwt_refresh_secret"
          OPENAI_API_KEY: "sk-ci-placeholder"

      - name: 🚨 Report Build Status
        if: failure()
        run: |
          echo "::error::Production build failed! Please check the logs above for specific error messages."
          echo "Common issues: Type errors in new components, missing environment variables, or broken dependency imports."
