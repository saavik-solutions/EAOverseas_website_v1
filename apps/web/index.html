<body>
  <div id="root"></div>
  <!-- Global Image Fallback: replaces any broken <img> with the EAOverseas logo automatically -->
  <script>
    (function () {
      // Path to the logo served as a static asset
      var LOGO_FALLBACK = '/logo.png';

      window.addEventListener('error', function (e) {
        var target = e.target;
        if (target && target.tagName === 'IMG') {
          // Prevent infinite loop if logo itself fails
          if (target.src && target.src.indexOf(LOGO_FALLBACK) !== -1) return;

          target.onerror = null; // prevent looping
          target.src = LOGO_FALLBACK;
          // Make the logo look centred & contained inside its container
          target.style.objectFit = 'contain';
          target.style.padding = '8px';
          target.style.opacity = '0.55';
          target.setAttribute('data-fallback', 'true');
        }
      }, true /* capture phase so it fires for all elements */);
    })();
  </script>
  <script type="module" src="/src/app/main.tsx"></script>
</body>
